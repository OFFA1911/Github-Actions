# ─────────────────────────────────────────────
#  gau configuration — used by the GitHub Actions workflow
#  Docs: https://github.com/lc/gau
# ─────────────────────────────────────────────

# Number of concurrent workers
threads = 5

# Show verbose output
verbose = false

# Retries on failure
retries = 5

# Include subdomains (*.target.com)
subdomains = true

# Include URLs with query parameters
parameters = true

# Sources to fetch URLs from
providers = ["wayback", "commoncrawl", "otx", "urlscan"]

# File extensions to skip (saves time + noise)
blacklist = [
  "ttf", "woff", "woff2", "eot",    # Fonts
  "png", "jpg", "jpeg",             # Images
  "gif", "ico", "webp", "bmp",      # More Images/Icons
  "mp3", "mp4", "avi", "mov"         # Media
]

# Output as JSON (set to false for plain text, easier to process)
json = false

# ─────────────────────────────────────────────
#  API Keys (optional — increases rate limit)
#  Set via GitHub secrets: URLSCAN_API_KEY, OTX_API_KEY
# ─────────────────────────────────────────────
[urlscan]
apikey = ""

[otx]
apikey = ""

# ─────────────────────────────────────────────
#  Filters
# ─────────────────────────────────────────────
[filters]
# Date range: format YYYYMM (leave empty = all time)
from = ""
to   = ""

# Only keep these HTTP status codes (empty = keep all)
matchstatuscodes = []

# Only keep these MIME types (empty = keep all)
matchmimetypes = []

# Drop these HTTP status codes
filterstatuscodes = []

# Drop these MIME types
filtermimetypes = [
  "image/png",
  "image/jpeg",
  "image/gif",
  "image/webp",
  "font/woff",
  "font/woff2",
  "audio/mpeg",
  "video/mp4"
]
