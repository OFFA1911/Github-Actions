name: 🔀 Open Redirect Scanner

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'URLs (one per line) — leave empty to use targets/open-redirect.txt'
        required: false
        default: ''
      chunk_size:
        description: 'Targets per parallel job (smaller = faster per job)'
        required: false
        default: '200'
      concurrency:
        description: 'Nuclei concurrency per job'
        required: false
        default: '50'
      rate_limit:
        description: 'Requests per second per job'
        required: false
        default: '150'

# ─────────────────────────────────────────────
# JOB 1 — Split targets into matrix chunks
# ─────────────────────────────────────────────
jobs:
  setup:
    name: 🔀 Split Targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📝 Prepare targets file
        run: |
          if [ -n "${{ github.event.inputs.targets }}" ]; then
            printf '%s' "${{ github.event.inputs.targets }}" > targets/open-redirect.txt
          fi
          echo "[*] Total targets: $(grep -vc '^#' targets/open-redirect.txt)"

      - name: 🔧 Build target chunks
        id: split
        env:
          CHUNK_SIZE: ${{ github.event.inputs.chunk_size }}
        run: |
          mapfile -t targets < <(grep -v '^#' targets/open-redirect.txt | grep -v '^$')
          total=${#targets[@]}
          chunk_size=${CHUNK_SIZE:-200}
          echo "✅ $total target(s) → chunks of $chunk_size"

          # Build matrix as array of objects: [{chunk: [...]}, ...]
          matrix="[]"
          chunk=()
          for t in "${targets[@]}"; do
            chunk+=("$t")
            if (( ${#chunk[@]} >= chunk_size )); then
              chunk_json=$(printf '%s\n' "${chunk[@]}" | jq -Rcs 'split("\n")[:-1]')
              matrix=$(echo "$matrix" | jq -c --argjson c "$chunk_json" '. + [{"chunk": $c}]')
              chunk=()
            fi
          done
          if (( ${#chunk[@]} > 0 )); then
            chunk_json=$(printf '%s\n' "${chunk[@]}" | jq -Rcs 'split("\n")[:-1]')
            matrix=$(echo "$matrix" | jq -c --argjson c "$chunk_json" '. + [{"chunk": $c}]')
          fi

          # jq -c ensures single-line compact JSON — required for GITHUB_OUTPUT key=value format
          printf 'matrix=%s\n' "$matrix" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────
# JOB 2 — Run nuclei on each chunk
# ─────────────────────────────────────────────
  scan:
    name: '🔀 Scan chunk ${{ strategy.job-index }}'
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 340   # safely under GitHub's 6-hour hard limit
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: 💾 Cache nuclei binary
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-bins-nuclei-${{ runner.os }}-v1

      - name: ⚙️ Install nuclei
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: 📌 Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: 📝 Write chunk targets
        run: |
          echo '${{ toJson(matrix.chunk) }}' | jq -r '.[]' > chunk_targets.txt
          echo "[*] Chunk size: $(wc -l < chunk_targets.txt)"

      - name: 🔀 Run Nuclei — Open Redirect
        run: |
          mkdir -p results
          nuclei \
            -l chunk_targets.txt \
            -t nuclei-templates/openRedirect.yaml \
            -c ${{ github.event.inputs.concurrency }} \
            -rate-limit ${{ github.event.inputs.rate_limit }} \
            -silent \
            -o results/findings.txt \
            -no-interactsh || true
          FOUND=$(grep -c '' results/findings.txt 2>/dev/null || echo 0)
          echo "[+] Findings in this chunk: $FOUND"

      - name: 📤 Upload chunk results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: open-redirect-chunk-${{ strategy.job-index }}
          path: results/findings.txt
          if-no-files-found: ignore
          retention-days: 14

# ─────────────────────────────────────────────
# JOB 3 — Merge results + Discord notify
# ─────────────────────────────────────────────
  merge:
    name: 🗂️ Merge & Notify
    needs: scan
    runs-on: ubuntu-latest
    if: always()
    outputs:
      found: ${{ steps.merge.outputs.found }}

    steps:
      - name: 📥 Download all chunk results
        uses: actions/download-artifact@v4
        with:
          pattern: open-redirect-chunk-*
          path: all-chunks/
          merge-multiple: false

      - name: 🔀 Merge findings
        id: merge
        run: |
          mkdir -p merged
          find all-chunks/ -name "findings.txt" -exec cat {} \; \
            | sort -u > merged/open-redirect-all.txt
          # wc -l + tr ensures a clean integer with no whitespace
          FOUND=$(wc -l < merged/open-redirect-all.txt 2>/dev/null | tr -d '[:space:]')
          FOUND=${FOUND:-0}
          echo "[+] Total unique findings: $FOUND"
          printf 'found=%s\n' "$FOUND" >> "$GITHUB_OUTPUT"

      - name: 📤 Upload merged results
        uses: actions/upload-artifact@v4
        with:
          name: open-redirect-ALL-${{ github.run_number }}
          path: merged/open-redirect-all.txt
          retention-days: 30

      - name: 🔔 Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          FOUND: ${{ steps.merge.outputs.found }}
        run: |
          FOUND=${FOUND:-0}
          STATUS="${{ needs.scan.result }}"

          if [ "$FOUND" -gt 0 ]; then
            COLOR=16744272   # orange — vulnerabilities found!
            EMOJI="🚨"
          elif [ "$STATUS" = "success" ]; then
            COLOR=3066993    # green
            EMOJI="✅"
          else
            COLOR=15158332   # red
            EMOJI="❌"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${EMOJI} Open Redirect Scan — Run #${{ github.run_number }}\",
                \"color\": ${COLOR},
                \"fields\": [
                  { \"name\": \"📋 Status\",   \"value\": \"\`${STATUS}\`\",  \"inline\": true },
                  { \"name\": \"🚨 Findings\", \"value\": \"\`${FOUND}\`\",   \"inline\": true },
                  { \"name\": \"🔗 Run URL\",  \"value\": \"[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"Nuclei • openRedirect • GitHub Actions\" }
              }]
            }"
