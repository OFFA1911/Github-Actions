name: 🌐 httpx + Screenshot

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'URLs/IPs (one per line) — leave empty to use targets.txt'
        required: false
        default: ''
      threads:
        description: 'httpx threads'
        required: false
        default: '50'

jobs:
  scan:
    name: 🔍 httpx + Screenshot
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Go setup ────────────────────────────────────────────────────
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      # ── 3. Cache httpx binary ──────────────────────────────────────────
      - name: 💾 Cache Go binaries
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-bins-httpx-${{ runner.os }}

      # ── 4. Install httpx only on cache miss ────────────────────────────
      - name: ⚙️ Install httpx
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/httpx/cmd/httpx@latest

      - name: 📌 Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      # ── 5. Prepare Chrome (required for httpx -screenshot) ─────────────
      - name: 🌍 Install Chrome
        uses: browser-actions/setup-chrome@v1

      # ── 6. Prepare targets file ────────────────────────────────────────
      - name: 📝 Prepare targets.txt
        run: |
          if [ -n "${{ github.event.inputs.targets }}" ]; then
            echo "${{ github.event.inputs.targets }}" > targets.txt
          fi
          echo "[*] Targets loaded: $(wc -l < targets.txt)"

      # ── 7. Run httpx with built-in screenshot ──────────────────────────
      - name: 🚀 Run httpx + Screenshot
        run: |
          mkdir -p screenshots
          httpx \
            -l targets.txt \
            -threads ${{ github.event.inputs.threads }} \
            -silent \
            -o live_hosts.txt \
            -status-code \
            -title \
            -tech-detect \
            -follow-redirects \
            -screenshot \
            -srd screenshots/
          echo "[+] Live hosts:   $(wc -l < live_hosts.txt)"
          echo "[+] Screenshots:  $(find screenshots/ -name '*.png' 2>/dev/null | wc -l)"

      # ── 8. Upload artifacts ────────────────────────────────────────────
      - name: 📤 Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: httpx-screenshot-${{ github.run_number }}
          path: |
            live_hosts.txt
            screenshots/
          retention-days: 14

      # ── 9. Discord notification ────────────────────────────────────────
      - name: 🔔 Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          LIVE=$(wc -l < live_hosts.txt 2>/dev/null || echo 0)
          SHOTS=$(find screenshots/ -name '*.png' 2>/dev/null | wc -l || echo 0)
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            COLOR=3066993
            EMOJI="✅"
          else
            COLOR=15158332
            EMOJI="❌"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${EMOJI} httpx + Screenshot — Run #${{ github.run_number }}",
              "color": ${COLOR},
              "fields": [
                { "name": "📋 Status",      "value": "\`${STATUS}\`", "inline": true },
                { "name": "🌐 Live hosts",  "value": "\`${LIVE}\`",  "inline": true },
                { "name": "📸 Screenshots", "value": "\`${SHOTS}\`", "inline": true },
                { "name": "🔗 Run URL", "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
              ],
              "footer": { "text": "GitHub Actions • ${{ github.repository }}" }
            }]
          }
          EOF
          )

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
