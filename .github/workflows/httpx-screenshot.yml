name: 🌐 httpx + Screenshot

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'URLs/IPs (one per line) — leave empty to use targets.txt'
        required: false
        default: ''
      threads:
        description: 'httpx threads'
        required: false
        default: '50'

jobs:
  scan:
    name: 🔍 httpx + Screenshot
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Go setup ────────────────────────────────────────────────────
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      # ── 3. Cache httpx binary ──────────────────────────────────────────
      - name: 💾 Cache Go binaries
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-bins-httpx-${{ runner.os }}-v3

      - name: ⚙️ Install httpx
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/httpx/cmd/httpx@latest

      - name: 📌 Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      # ── 4. Prepare targets file ────────────────────────────────────────
      - name: 📝 Prepare targets.txt
        run: |
          if [ -n "${{ github.event.inputs.targets }}" ]; then
            printf '%s' "${{ github.event.inputs.targets }}" > targets/httpx-screenshot.txt
          fi
          echo "[*] Targets: $(wc -l < targets/httpx-screenshot.txt)"

      # ── 5. Run httpx (probe only, no screenshot) ───────────────────────
      - name: 🚀 Run httpx
        run: |
          httpx \
            -l targets/httpx-screenshot.txt \
            -threads ${{ github.event.inputs.threads }} \
            -silent \
            -o live_hosts.txt \
            -status-code \
            -title \
            -tech-detect \
            -follow-redirects
          echo "[+] Live hosts: $(wc -l < live_hosts.txt)"
          cat live_hosts.txt

      # ── 6. Take screenshots with headless Chrome ───────────────────────
      - name: 📸 Take Screenshots
        run: |
          mkdir -p screenshots

          # Extract just the URLs (first column from httpx output)
          awk '{print $1}' live_hosts.txt > urls_only.txt

          # Install Chromium if not present
          if ! command -v chromium-browser &>/dev/null && ! command -v google-chrome &>/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq chromium-browser
          fi

          CHROME=$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium)
          echo "[*] Using Chrome: $CHROME"

          while IFS= read -r url; do
            [ -z "$url" ] && continue
            FNAME=$(echo "$url" | md5sum | cut -d' ' -f1)
            echo "[→] Screenshot: $url"
            "$CHROME" \
              --headless=new \
              --no-sandbox \
              --disable-gpu \
              --disable-dev-shm-usage \
              --ignore-certificate-errors \
              --ignore-ssl-errors \
              --allow-insecure-localhost \
              --screenshot="screenshots/${FNAME}.png" \
              --window-size=1280,800 \
              --timeout=15000 \
              "$url" 2>/dev/null || echo "  [!] Failed: $url"
          done < urls_only.txt

          echo "[+] Screenshots: $(find screenshots/ -name '*.png' | wc -l)"

      # ── 7. Upload artifacts ────────────────────────────────────────────
      - name: 📤 Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: httpx-screenshot-${{ github.run_number }}
          path: |
            live_hosts.txt
            screenshots/
          retention-days: 14

      # ── 8. Discord notification ────────────────────────────────────────
      - name: 🔔 Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          LIVE=$(wc -l < live_hosts.txt 2>/dev/null || echo 0)
          SHOTS=$(find screenshots/ -name '*.png' 2>/dev/null | wc -l || echo 0)
          STATUS="${{ job.status }}"

          [ "$STATUS" = "success" ] && COLOR=3066993 && EMOJI="✅" || COLOR=15158332 && EMOJI="❌"

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${EMOJI} httpx + Screenshot — Run #${{ github.run_number }}\",
                \"color\": ${COLOR},
                \"fields\": [
                  { \"name\": \"📋 Status\",      \"value\": \"\`${STATUS}\`\", \"inline\": true },
                  { \"name\": \"🌐 Live hosts\",  \"value\": \"\`${LIVE}\`\",  \"inline\": true },
                  { \"name\": \"📸 Screenshots\", \"value\": \"\`${SHOTS}\`\", \"inline\": true },
                  { \"name\": \"🔗 Run URL\", \"value\": \"[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"GitHub Actions • ${{ github.repository }}\" }
              }]
            }"
