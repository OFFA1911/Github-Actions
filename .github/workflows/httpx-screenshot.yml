name: 🌐 httpx + Screenshot

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'URLs/IPs (one per line) — leave empty to use targets.txt'
        required: false
        default: ''
      threads:
        description: 'httpx threads'
        required: false
        default: '50'

jobs:
  scan:
    name: 🔍 httpx + Screenshot
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Go setup (needed for tool installs) ─────────────────────────
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false          # We handle the cache ourselves below

      # ── 3. Cache Go tools (httpx + gowitness binaries) ─────────────────
      - name: 💾 Cache Go binaries
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-bins-httpx-gowitness-${{ runner.os }}

      # ── 4. Install tools only when cache miss ──────────────────────────
      - name: ⚙️ Install httpx & gowitness
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/sensepost/gowitness@latest

      - name: 📌 Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      # ── 5. Prepare Chrome (needed by gowitness) ────────────────────────
      - name: 🌍 Install Chrome
        uses: browser-actions/setup-chrome@v1

      # ── 6. Prepare targets file ────────────────────────────────────────
      - name: 📝 Prepare targets.txt
        run: |
          if [ -n "${{ github.event.inputs.targets }}" ]; then
            echo "${{ github.event.inputs.targets }}" > targets.txt
          fi
          echo "[*] Targets loaded: $(wc -l < targets.txt)"

      # ── 7. Run httpx ───────────────────────────────────────────────────
      - name: 🚀 Run httpx
        run: |
          httpx \
            -l targets.txt \
            -threads ${{ github.event.inputs.threads }} \
            -silent \
            -o live_hosts.txt \
            -status-code \
            -title \
            -tech-detect \
            -follow-redirects
          echo "[+] Live hosts: $(wc -l < live_hosts.txt)"

      # ── 8. Take screenshots with gowitness ────────────────────────────
      - name: 📸 Screenshot live hosts
        run: |
          mkdir -p screenshots
          # gowitness reads a plain URL list — strip the extra httpx fields first
          awk '{print $1}' live_hosts.txt > urls_only.txt
          gowitness scan file \
            --file urls_only.txt \
            --screenshot-path screenshots/ \
            --threads 5 \
            --timeout 20
          echo "[+] Screenshots taken: $(ls screenshots/*.png 2>/dev/null | wc -l)"

      # ── 9. Upload artifacts ────────────────────────────────────────────
      - name: 📤 Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: httpx-screenshot-${{ github.run_number }}
          path: |
            live_hosts.txt
            screenshots/
          retention-days: 14

      # ── 10. Discord notification ───────────────────────────────────────
      - name: 🔔 Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          LIVE=$(wc -l < live_hosts.txt 2>/dev/null || echo 0)
          SHOTS=$(ls screenshots/*.png 2>/dev/null | wc -l || echo 0)
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            COLOR=3066993      # green
            EMOJI="✅"
          else
            COLOR=15158332     # red
            EMOJI="❌"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${EMOJI} httpx + Screenshot — Run #${{ github.run_number }}",
              "color": ${COLOR},
              "fields": [
                { "name": "📋 Status",         "value": "\`${STATUS}\`",   "inline": true },
                { "name": "🌐 Live hosts",     "value": "\`${LIVE}\`",    "inline": true },
                { "name": "📸 Screenshots",    "value": "\`${SHOTS}\`",   "inline": true },
                { "name": "🔗 Run URL",        "value": "[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
              ],
              "footer": { "text": "GitHub Actions • ${{ github.repository }}" }
            }]
          }
          EOF
          )

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
