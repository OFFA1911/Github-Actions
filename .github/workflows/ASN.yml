name: ASN

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Domain or Org name'
        required: true

jobs:
  recon:
    runs-on: ubuntu-latest

    steps:
    # ==============================
    # Cache Tools
    # ==============================
    - name: Cache tools
      id: cache-tools
      uses: actions/cache@v4
      with:
        path: ~/go/bin
        key: tools-cache-v1

    # ==============================
    # Install Go Tools (if not cached)
    # ==============================
    - name: Install tools
      if: steps.cache-tools.outputs.cache-hit != 'true'
      run: |
        go install github.com/projectdiscovery/asnmap/cmd/asnmap@latest
        go install github.com/projectdiscovery/mapcidr/cmd/mapcidr@latest
        go install github.com/projectdiscovery/dnsx/cmd/dnsx@latest
        go install github.com/projectdiscovery/tlsx/cmd/tlsx@latest
        go install github.com/projectdiscovery/httpx/cmd/httpx@latest
        go install github.com/projectdiscovery/naabu/v2/cmd/naabu@latest
        go install github.com/owasp-amass/amass/v4/...@master

    - name: Add Go bin to PATH
      run: echo "$HOME/go/bin" >> $GITHUB_PATH

    # ==============================
    # STEP 1: ASN Discovery
    # ==============================
    - name: ASN Discovery
      run: |
        asnmap -org "${{ github.event.inputs.target }}" -silent > asns.txt
        cat asns.txt

    # ==============================
    # STEP 2: CIDRs
    # ==============================
    - name: Get CIDRs
      run: |
        cat asns.txt | asnmap -silent > cidrs.txt
        cat cidrs.txt

    # ==============================
    # STEP 3: IPs
    # ==============================
    - name: Expand IPs
      run: |
        cat cidrs.txt | mapcidr -silent > ips.txt
        wc -l ips.txt

    # ==============================
    # STEP 4: Domains
    # ==============================
    - name: Reverse DNS
      run: |
        cat ips.txt | dnsx -ptr -resp-only -silent > resolved_domains.txt

    - name: TLS Certs
      run: |
        cat ips.txt | tlsx -san -cn -silent -ro > tls_domains.txt

    - name: Merge Domains
      run: |
        cat resolved_domains.txt tls_domains.txt | sort -u > all_targets.txt
        wc -l all_targets.txt

    # ==============================
    # STEP 5: Live Web Apps
    # ==============================
    - name: HTTP Probe
      run: |
        cat all_targets.txt | httpx -sc -title -td -silent > live_web_assets.txt

    # ==============================
    # STEP 6: Port Scan
    # ==============================
    - name: Port Scan
      run: |
        cat ips.txt | naabu -top-ports 1000 -silent -o open_ports.txt

    # ==============================
    # Discord Notification
    # ==============================
    - name: Send to Discord
      run: |
        SUMMARY="**ASN Recon: ${{ github.event.inputs.target }}**\n"
        SUMMARY+="CIDRs: $(wc -l < cidrs.txt)\n"
        SUMMARY+="IPs: $(wc -l < ips.txt)\n"
        SUMMARY+="Domains: $(wc -l < all_targets.txt)\n"
        SUMMARY+="Live Web: $(wc -l < live_web_assets.txt)\n"
        SUMMARY+="Open Ports: $(wc -l < open_ports.txt)\n\n"
        
        LIVE=$(head -20 live_web_assets.txt)
        SUMMARY+="**Live Assets (first 20):**\n\`\`\`\n$LIVE\n\`\`\`"

        curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{\"content\": \"$SUMMARY\"}"

    # ==============================
    # Upload Results as Artifacts
    # ==============================
    - name: Upload Results
      uses: actions/upload-artifact@v3
      with:
        name: asn-recon-results
        path: |
          asns.txt
          cidrs.txt
          ips.txt
          all_targets.txt
          live_web_assets.txt
          open_ports.txt
