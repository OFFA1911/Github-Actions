name: Dirsearch Bug Bounty

on:
  workflow_dispatch:
    inputs:
      ips_file:
        description: 'Path to alive IPs file (default: ips_alive)'
        required: false
        default: 'ips_alive'
      threads:
        description: 'Number of threads (default: 25)'
        required: false
        default: '25'
  push:
    branches: [main]
    paths:
      - 'ips_alive'

jobs:
  dirsearch:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dirsearch
        run: |
          pip install dirsearch

      - name: Run dirsearch
        run: |
          IPS_FILE="${{ github.event.inputs.ips_file || 'ips_alive' }}"
          THREADS="${{ github.event.inputs.threads || '25' }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT="output_${TIMESTAMP}.txt"

          dirsearch \
            -l "$IPS_FILE" \
            --full-url \
            --recursive \
            --exclude-sizes=0B \
            --random-agent \
            -t "$THREADS" \
            -e 7z,archive,ashx,asp,aspx,back,backup,backup-sql,backup.db,backup.sql,bak,bak.zip,bakup,bin,bkp,bson,bz2,core,csv,data,dataset,db,db-backup,db-dump,db.7z,db.bz2,db.gz,db.tar,db.tar.gz,db.zip,dbs.bz2,dll,dmp,dump,dump.7z,dump.db,dump.z,dump.zip,exported,gdb,gdb.dump,gz,gzip,ib,ibd,iso,jar,java,json,jsp,jspf,jspx,ldf,log,lz,lz4,lzh,mongo,neo4j,old,pg.dump,phtm,phtml,psql,rar,rb,rdb,rdb.bz2,rdb.gz,rdb.tar,rdb.tar.gz,rdb.zip,redis,save,sde,sdf,snap,sql,sql.7z,sql.bak,sql.bz2,sql.db,sql.dump,sql.gz,sql.lz,sql.rar,sql.tar.gz,sql.tar.z,sql.xz,sql.z,sql.zip,sqlite,sqlite.bz2,sqlite.gz,sqlite.tar,sqlite.tar.gz,sqlite.zip,sqlite3,sqlitedb,swp,tar,tar.bz2,tar.gz,tar.z,temp,tml,vbk,vhd,war,xhtml,xml,xz,z,zip,conf,config,bak,backup,swp,old,db,sql,asp,aspx~,asp~,py,py~,rb~,php,php~,bkp,cache,cgi,inc,js,json,jsp~,lock,wadl \
            -o "$OUTPUT"

          echo "OUTPUT_FILE=$OUTPUT" >> $GITHUB_ENV

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dirsearch-results-${{ github.run_number }}
          path: output_*.txt
          retention-days: 30

      - name: Summary
        run: |
          echo "## Dirsearch Results" >> $GITHUB_STEP_SUMMARY
          echo "- Output: \`${{ env.OUTPUT_FILE }}\`" >> $GITHUB_STEP_SUMMARY
          LINES=$(wc -l < "${{ env.OUTPUT_FILE }}" 2>/dev/null || echo 0)
          echo "- Total findings: **${LINES}**" >> $GITHUB_STEP_SUMMARY
