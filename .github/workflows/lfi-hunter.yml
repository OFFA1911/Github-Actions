name: Recon LFI Pipeline

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Target domain (e.g. example.com)"
        required: true
        type: string

jobs:
  recon:
    name: Recon → LFI Scan
    runs-on: ubuntu-latest
    timeout-minutes: 360   # يوقف الـ job بعد 6 ساعات تلقائياً

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout (مطلوب لتفعيل الـ cache action)
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Cache الأدوات (مسار /usr/local/bin)
      # ─────────────────────────────────────────────
      - name: Cache Go tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin
            /usr/local/bin/subfinder
            /usr/local/bin/httpx
            /usr/local/bin/katana
            /usr/local/bin/nuclei
            /usr/local/bin/waybackurls
            /usr/local/bin/gf
            ~/.gf
          key: recon-tools-v2

      # ─────────────────────────────────────────────
      # 3. تثبيت الأدوات (بس لو مش موجودة في الكاش)
      # ─────────────────────────────────────────────
      - name: Setup Go
        if: steps.cache-tools.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          set -e
          GO_TOOLS=(
            "github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest"
            "github.com/projectdiscovery/httpx/cmd/httpx@latest"
            "github.com/projectdiscovery/katana/cmd/katana@latest"
            "github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest"
            "github.com/tomnomnom/waybackurls@latest"
            "github.com/tomnomnom/gf@latest"
          )
          for tool in "${GO_TOOLS[@]}"; do
            echo "Installing $tool ..."
            go install "$tool"
          done
          # نسخ الـ binaries لـ PATH عشان الـ cache يشيلها
          sudo cp ~/go/bin/subfinder  /usr/local/bin/subfinder
          sudo cp ~/go/bin/httpx      /usr/local/bin/httpx
          sudo cp ~/go/bin/katana     /usr/local/bin/katana
          sudo cp ~/go/bin/nuclei     /usr/local/bin/nuclei
          sudo cp ~/go/bin/waybackurls /usr/local/bin/waybackurls
          sudo cp ~/go/bin/gf         /usr/local/bin/gf

      - name: Install gf patterns
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.gf
          git clone --depth 1 https://github.com/1ndianl33t/Gf-Patterns /tmp/gf-patterns
          cp /tmp/gf-patterns/*.json ~/.gf/

      - name: Update nuclei templates
        run: nuclei -update-templates -silent

      # ─────────────────────────────────────────────
      # 4. حل مفاتيح subfinder
      # ─────────────────────────────────────────────
      - name: Write subfinder provider config
        run: |
          mkdir -p ~/.config/subfinder
          # Secret اسمه ENUMERATION وفيه محتوى provider-config.yaml كامل
          echo "${{ secrets.ENUMERATION }}" > ~/.config/subfinder/provider-config.yaml

      # ─────────────────────────────────────────────
      # 5. المتغيرات المشتركة
      # ─────────────────────────────────────────────
      - name: Set target
        run: echo "TARGET=${{ github.event.inputs.domain }}" >> "$GITHUB_ENV"

      # ─────────────────────────────────────────────
      # 6. Subfinder
      # ─────────────────────────────────────────────
      - name: Subfinder – enumerate subdomains
        run: |
          subfinder -d "$TARGET" -silent -o subdomains.txt
          echo "Subdomains found: $(wc -l < subdomains.txt)"

      # ─────────────────────────────────────────────
      # 7. httpx
      # ─────────────────────────────────────────────
      - name: httpx – probe live hosts
        run: |
          httpx -l subdomains.txt -silent -o live-hosts.txt
          echo "Live hosts: $(wc -l < live-hosts.txt)"

      # ─────────────────────────────────────────────
      # 8. Waybackurls (على الـ subdomains)
      # ─────────────────────────────────────────────
      - name: Waybackurls – collect archived URLs
        run: |
          cat subdomains.txt | waybackurls > wayback-urls.txt
          echo "Wayback URLs: $(wc -l < wayback-urls.txt)"

      # ─────────────────────────────────────────────
      # 9. Katana (على الـ live hosts من httpx)
      # ─────────────────────────────────────────────
      - name: Katana – crawl live hosts
        run: |
          katana -list live-hosts.txt \
                 -d 5 -jc -jsl \
                 -c 50 -p 50 \
                 -silent \
                 -o crawl-urls.txt
          echo "Katana URLs: $(wc -l < crawl-urls.txt)"

      # ─────────────────────────────────────────────
      # 10. Merge + Dedup
      # ─────────────────────────────────────────────
      - name: Merge katana + wayback and deduplicate
        run: |
          cat crawl-urls.txt wayback-urls.txt | sort -u > all-urls.txt
          echo "Total unique URLs: $(wc -l < all-urls.txt)"

      # ─────────────────────────────────────────────
      # 11. gf lfi
      # ─────────────────────────────────────────────
      - name: gf – filter LFI candidates
        run: |
          cat all-urls.txt | gf lfi > lfi-candidates.txt
          echo "LFI candidates: $(wc -l < lfi-candidates.txt)"

      # ─────────────────────────────────────────────
      # 12. Nuclei LFI scan
      # ─────────────────────────────────────────────
      - name: Nuclei – scan for LFI
        run: |
          if [ ! -s lfi-candidates.txt ]; then
            echo "No LFI candidates found, skipping nuclei."
            exit 0
          fi
          nuclei -l lfi-candidates.txt \
                 -tags lfi \
                 -o nuclei-results.txt \
                 -silent
          echo "Nuclei results: $(wc -l < nuclei-results.txt)"

      # ─────────────────────────────────────────────
      # 13. رفع النتائج كـ artifacts
      # ─────────────────────────────────────────────
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recon-results-${{ github.event.inputs.domain }}
          path: |
            subdomains.txt
            live-hosts.txt
            wayback-urls.txt
            crawl-urls.txt
            all-urls.txt
            lfi-candidates.txt
            nuclei-results.txt
          retention-days: 7
