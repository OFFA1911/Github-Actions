name: 🔍 Wayback URL Fetcher

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Single domain (leave empty → targets.txt)'
        required: false
        default: ''
      chunk_size:
        description: 'Domains per parallel job'
        required: false
        default: '30'

# ─────────────────────────────────────────────
# JOB 1 — Split targets into matrix chunks
# ─────────────────────────────────────────────
jobs:
  setup:
    name: 📋 Split Targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔪 Build domain chunks (bash + jq)
        id: split
        env:
          DOMAIN_INPUT: ${{ github.event.inputs.domain }}
          CHUNK_SIZE:   ${{ github.event.inputs.chunk_size }}
        run: |
          if [ -n "$DOMAIN_INPUT" ]; then
            mapfile -t domains <<< "$DOMAIN_INPUT"
          else
            mapfile -t domains < <(grep -v '^#' targets.txt | grep -v '^$')
          fi
          total=${#domains[@]}
          chunk_size=${CHUNK_SIZE:-30}
          echo "✅ $total domain(s) → splitting into chunks of $chunk_size"

          matrix="[]"
          chunk=()
          for domain in "${domains[@]}"; do
            chunk+=("$domain")
            if (( ${#chunk[@]} >= chunk_size )); then
              chunk_json=$(printf '%s\n' "${chunk[@]}" | jq -Rcs 'split("\n")[:-1]')
              matrix=$(echo "$matrix" | jq --argjson c "$chunk_json" '. + [$c]')
              chunk=()
            fi
          done
          if (( ${#chunk[@]} > 0 )); then
            chunk_json=$(printf '%s\n' "${chunk[@]}" | jq -Rcs 'split("\n")[:-1]')
            matrix=$(echo "$matrix" | jq --argjson c "$chunk_json" '. + [$c]')
          fi

          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────
# JOB 2 — Build & run Go scanner on each chunk
# ─────────────────────────────────────────────
  fetch:
    name: '🕸️ Fetch chunk ${{ strategy.job-index }}'
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: scanner/go.mod

      - name: ⚙️ Install waybackurls (tomnomnom)
        run: |
          go install github.com/tomnomnom/waybackurls@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: 🏗️ Build scanner
        run: cd scanner && go build -o wayback-scanner .

      - name: 📝 Write domains file
        run: |
          echo '${{ toJson(matrix.chunk) }}' | jq -r '.[]' > domains.txt

      - name: 🔍 Run scanner (waybackurls)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          ./scanner/wayback-scanner \
            -domains domains.txt \
            -out     scanner/results \
            -webhook "$DISCORD_WEBHOOK"

      - name: 📤 Upload chunk results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wayback-results-chunk-${{ strategy.job-index }}
          path: scanner/results/
          retention-days: 7

# ─────────────────────────────────────────────
# JOB 3 — Merge all chunks into one file
# ─────────────────────────────────────────────
  merge:
    name: 🗂️ Merge All Results
    needs: fetch
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download all chunk artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wayback-results-chunk-*
          path: all-chunks/
          merge-multiple: false

      - name: 🔀 Merge → all_urls.txt
        run: |
          mkdir -p merged
          # Merge all .txt files from chunks into one file
          find all-chunks/ -name "*.txt" -exec cat {} \; \
            | sort -u > merged/all_urls.txt
          TOTAL=$(wc -l < merged/all_urls.txt)
          printf "✅ Grand total: %'d unique URLs\n" "$TOTAL"
          echo "TOTAL_URLS=$TOTAL" >> "$GITHUB_ENV"

      - name: 📤 Upload final merged file
        uses: actions/upload-artifact@v4
        with:
          name: wayback-ALL-RESULTS-${{ github.run_number }}
          path: merged/all_urls.txt
          retention-days: 30

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 🏗️ Build scanner (for notify)
        run: cd scanner && go build -o wayback-scanner .

      - name: 🔔 Final Discord summary
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          ./scanner/wayback-scanner notify \
            -total   "$TOTAL_URLS" \
            -webhook "$DISCORD_WEBHOOK"
